name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build
        run: dotnet build IntelcomTracker.Tests/ --configuration Release

      - name: Test
        run: dotnet test IntelcomTracker.Tests/ --configuration Release --no-build --logger "console;verbosity=normal"
