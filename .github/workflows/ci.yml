name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore IntelcomTracker.Tests/ --locked-mode

      - name: Build
        run: dotnet build IntelcomTracker.Tests/ --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test IntelcomTracker.Tests/
          --configuration Release --no-build
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:coverage/report \
            -reporttypes:MarkdownSummaryGithub

      - name: Write coverage to job summary
        run: cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh pr comment "${{ github.event.pull_request.number }}"
          --repo "${{ github.repository }}"
          --body-file coverage/report/SummaryGithub.md
