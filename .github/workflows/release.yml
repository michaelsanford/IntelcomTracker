name: Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: IntelcomTracker.exe
            suffix: win-x64.exe
          - rid: win-arm64
            artifact: IntelcomTracker.exe
            suffix: win-arm64.exe
          - rid: linux-x64
            artifact: IntelcomTracker
            suffix: linux-x64
          - rid: linux-arm64
            artifact: IntelcomTracker
            suffix: linux-arm64
          - rid: linux-musl-x64
            artifact: IntelcomTracker
            suffix: linux-musl-x64
          - rid: linux-musl-arm64
            artifact: IntelcomTracker
            suffix: linux-musl-arm64
          - rid: osx-x64
            artifact: IntelcomTracker
            suffix: osx-x64
          - rid: osx-arm64
            artifact: IntelcomTracker
            suffix: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish self-contained binary
        run: |
          dotnet publish IntelcomTracker.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --output publish/

      - name: Rename artifact
        run: cp "publish/${{ matrix.artifact }}" "publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
