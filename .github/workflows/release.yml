name: Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: IntelcomTracker.exe
            suffix: win-x64.exe
          - rid: win-arm64
            artifact: IntelcomTracker.exe
            suffix: win-arm64.exe
          - rid: linux-x64
            artifact: IntelcomTracker
            suffix: linux-x64
          - rid: linux-arm64
            artifact: IntelcomTracker
            suffix: linux-arm64
          - rid: linux-musl-x64
            artifact: IntelcomTracker
            suffix: linux-musl-x64
          - rid: linux-musl-arm64
            artifact: IntelcomTracker
            suffix: linux-musl-arm64
          - rid: osx-x64
            artifact: IntelcomTracker
            suffix: osx-x64
          - rid: osx-arm64
            artifact: IntelcomTracker
            suffix: osx-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore IntelcomTracker.csproj --locked-mode

      - name: Publish self-contained binary
        run: |
          dotnet publish IntelcomTracker.csproj \
            --no-restore \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --output publish/

      - name: Rename artifact
        run: cp "publish/${{ matrix.artifact }}" "publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}"

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          dotnet-CycloneDX IntelcomTracker.csproj -o publish/ -fn sbom-${{ matrix.suffix }}.json -F Json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign artifact with cosign
        run: |
          cosign sign-blob --yes \
            publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }} \
            --bundle publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.suffix }}
          path: |
            publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}
            publish/IntelcomTracker-${{ github.ref_name }}-${{ matrix.suffix }}.bundle
            publish/sbom-${{ matrix.suffix }}.json

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
